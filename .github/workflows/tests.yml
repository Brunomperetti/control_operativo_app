name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install project from Streamlit entrypoint
        run: python -m pip install -r requirements.txt
      - name: Install pytest
        run: python -m pip install pytest
      - name: Verify imports
        run: python -c "import kiki_control; import app; print('imports ok')"
      - name: Run pytest
        run: pytest
      - name: Compile sources and tests
        run: python -m compileall -q src tests app.py
